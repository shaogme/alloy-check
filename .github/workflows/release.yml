name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: alloy-check-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: alloy-check-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: alloy-check-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: alloy-check-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: alloy-check-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: alloy-check-windows-arm64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        uses: shaogme/speedy-cargo-zigbuild@main

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build with cargo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cargo zigbuild (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/alloy-check.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/alloy-check dist/${{ matrix.name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: out
          merge-multiple: true

      - name: Delete old release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete stable --cleanup-tag -y || true

      - name: Create new stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: Stable Release
          files: out/*
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
